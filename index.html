<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="ico.png">
<title>TAREAS — Billblood</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e; --surface: #181818; --border: #2a2a2a;
    --urgent: #ff3c3c; --normal: #c8ff57; --done: #3a3a3a;
    --text: #f0f0f0; --muted: #555;
    --personal: #ffaa33; --trabajo: #57c8ff;
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh; padding: 2rem 1.5rem 4rem;
    max-width: 680px; margin: 0 auto;
  }

  header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 1.8rem; border-bottom: 2px solid var(--border); padding-bottom: 1rem;
  }
  h1 { font-family: var(--font-display); font-size: 4rem; letter-spacing: 0.04em; line-height: 0.85; align-self: flex-end; }
  .counter {
    display: flex;
    justify-content: space-around;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    margin-bottom: 1rem;
  }

  .counter-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
  }

  .counter-num {
    font-family: var(--font-display);
    font-size: 2rem;
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .counter-label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .counter-divider {
    width: 1px;
    height: 2rem;
    background: var(--border);
  }

  /* TABS */
  .tabs-wrapper { display: flex; align-items: flex-start; gap: 0.5rem; margin-bottom: 2rem; }
  .tabs { flex: 1; display: flex; flex-wrap: wrap; gap: 0.4rem; }

  .tab-btn {
    padding: 0.55rem 0.9rem;
    background: var(--surface); border: 1px solid var(--border);
    font-family: var(--font-display); font-size: 1.1rem;
    letter-spacing: 0.08em; color: var(--muted);
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 0.4rem; white-space: nowrap;
    border-radius: 10px;
  }
  .tab-badge { font-family: var(--font-mono); font-size: 0.58rem; opacity: 0.8; }
  .tab-remove {
    background: none; border: none; color: var(--muted);
    font-size: 0.7rem; cursor: pointer; padding: 0; line-height: 1; transition: color 0.15s;
  }
  .tab-remove:hover { color: var(--urgent); }

  .add-list-btn {
    padding: 0.55rem 0.8rem; background: transparent;
    border: 1px dashed var(--border); color: var(--muted);
    font-family: var(--font-display); font-size: 1.3rem;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
    border-radius: 10px;
  }
  .add-list-btn:hover { border-color: #c084fc; color: #c084fc; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 100;
    align-items: center; justify-content: center; padding: 1.5rem;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #1a1a1a; border: 1px solid var(--border);
    padding: 1.5rem; width: 100%; max-width: 380px;
    animation: slideIn 0.2s ease; border-radius: 14px;
  }

  .modal-title {
    font-family: var(--font-display); font-size: 1.8rem;
    letter-spacing: 0.08em; margin-bottom: 1rem; color: var(--text);
    transition: color 0.2s;
  }

  .modal input[type="text"] {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); color: var(--text);
    font-family: var(--font-mono); font-size: 0.9rem;
    padding: 0.75rem 1rem; outline: none; margin-bottom: 1rem;
    transition: border-color 0.2s;
  }

  /* PALETA DE COLORES */
  .color-label {
    font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 0.6rem;
  }

  .color-palette {
    display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.2rem;
  }

  .color-swatch {
    width: 28px; height: 28px;
    border-radius: 50%; cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: #fff; transform: scale(1.2); }

  .modal-btns { display: flex; gap: 0.5rem; margin-top: 0.5rem; }

  .modal-confirm {
    flex: 1; padding: 0.7rem; color: #0e0e0e;
    border: none; font-family: var(--font-display);
    font-size: 1.1rem; letter-spacing: 0.06em;
    cursor: pointer; transition: opacity 0.15s;
  }
  .modal-confirm:hover { opacity: 0.85; }

  .modal-cancel {
    padding: 0.7rem 1rem; background: transparent;
    border: 1px solid var(--border); color: var(--muted);
    font-family: var(--font-mono); font-size: 0.8rem;
    cursor: pointer; transition: all 0.15s;
  }
  .modal-cancel:hover { border-color: var(--text); color: var(--text); }

  /* INPUT AREA */
  .add-area { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 2.5rem; }
  .input-row { display: flex; gap: 0.5rem; }

  input[type="text"] {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: var(--font-mono); font-size: 0.85rem;
    padding: 0.75rem 1rem; outline: none; transition: border-color 0.15s;
    border-radius: 10px;
  }
  input[type="text"]::placeholder { color: var(--muted); }

  .priority-toggle { display: flex; gap: 0.4rem; }
  .prio-btn {
    flex: 1; padding: 0.6rem 1rem; border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-family: var(--font-mono); font-size: 0.75rem;
    letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; text-transform: uppercase;
    border-radius: 10px;
  }
  .prio-btn.active-urgent { border-color: var(--urgent); color: var(--urgent); background: rgba(255,60,60,0.08); }
  .prio-btn.active-normal { border-color: var(--normal); color: var(--normal); background: rgba(200,255,87,0.08); }

  .add-btn {
    padding: 0.75rem 1.4rem; border: none;
    font-family: var(--font-display); font-size: 1.1rem;
    letter-spacing: 0.06em; cursor: pointer;
    transition: opacity 0.15s; white-space: nowrap; color: #0e0e0e;
    border-radius: 10px;
  }
  .add-btn:hover { opacity: 0.85; }

  /* FILTERS */
  .filters { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .filter-btn {
    padding: 0.3rem 0.8rem; border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-family: var(--font-mono); font-size: 0.7rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s; border-radius: 20px;
  }
  .filter-btn.active { border-color: var(--text); color: var(--text); }

  /* TASKS */
  .section-label {
    font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 0.6rem; margin-top: 1.8rem;
  }
  .task-list { display: flex; flex-direction: column; gap: 0.4rem; }

  .task-item {
    display: flex; align-items: center; gap: 0.8rem;
    padding: 0.75rem 1rem; background: var(--surface);
    border: 1px solid var(--border); border-left: 3px solid transparent;
    transition: all 0.15s; animation: slideIn 0.2s ease;
    border-radius: 10px;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .task-item.urgent { border-left-color: var(--urgent); }
  .task-item.normal { border-left-color: var(--normal); }
  .task-item.done   { border-left-color: var(--done); opacity: 0.4; }

  .task-check {
    width: 18px; height: 18px; border: 1px solid var(--border);
    background: transparent; cursor: pointer; flex-shrink: 0;
    position: relative; transition: all 0.15s;
  }
  .task-item.done .task-check { background: var(--done); border-color: var(--done); }
  .task-item.done .task-check::after {
    content: '✓'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; color: #888;
  }

  .task-text { flex: 1; font-size: 0.85rem; line-height: 1.4; color: var(--text); }
  .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

  .task-ts {
    font-size: 0.58rem; color: var(--muted);
    letter-spacing: 0.05em; white-space: nowrap; flex-shrink: 0;
  }

  .task-prio-tag {
    font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 0.15rem 0.4rem; border: 1px solid; flex-shrink: 0;
  }
  .task-item.urgent .task-prio-tag { color: var(--urgent); border-color: var(--urgent); }
  .task-item.normal .task-prio-tag { color: var(--normal); border-color: var(--normal); }
  .task-item.done   .task-prio-tag { color: var(--done);   border-color: var(--done); }

  .task-delete {
    background: none; border: none; color: var(--muted);
    font-size: 1rem; cursor: pointer; padding: 0 0.2rem;
    transition: color 0.15s; flex-shrink: 0;
  }
  .task-delete:hover { color: var(--urgent); }

  .empty {
    text-align: center; padding: 3rem 1rem; color: var(--muted);
    font-size: 0.75rem; letter-spacing: 0.08em; border: 1px dashed var(--border);
  }
  .empty-icon { font-size: 2rem; margin-bottom: 0.8rem; opacity: 0.4; }

  .clear-done {
    margin-top: 1.5rem; background: none; border: 1px dashed var(--border);
    color: var(--muted); font-family: var(--font-mono); font-size: 0.7rem;
    letter-spacing: 0.1em; text-transform: uppercase; padding: 0.5rem 1rem;
    cursor: pointer; width: 100%; transition: all 0.15s; border-radius: 10px;
  }
  .clear-done:hover { border-color: var(--urgent); color: var(--urgent); }

  footer {
    margin-top: 2.5rem;
    text-align: center;
    font-size: 0.5rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
  }
</style>
</head>
<body>

<header style="align-items:flex-end;">
  <h1>TAREAS</h1>
  <div id="dateDisplay" style="text-align:right; line-height:1.4; padding-bottom:0.15rem;">
    <div style="font-size:0.65rem; letter-spacing:0.18em; color:var(--muted); text-transform:uppercase;" id="dayName"></div>
    <div style="font-family:var(--font-display); font-size:1.6rem; letter-spacing:0.06em; line-height:1;" id="dayDate"></div>
  </div>
</header>

<div class="counter" id="counter">
  <div class="counter-item">
    <span class="counter-num" id="c-urgent" style="color:var(--urgent)">0</span>
    <span class="counter-label">Urgentes</span>
  </div>
  <div class="counter-divider"></div>
  <div class="counter-item">
    <span class="counter-num" id="c-normal" style="color:var(--normal)">0</span>
    <span class="counter-label">Normales</span>
  </div>
  <div class="counter-divider"></div>
  <div class="counter-item">
    <span class="counter-num" id="c-done" style="color:var(--muted)">0</span>
    <span class="counter-label">Hechas</span>
  </div>
</div>

<div class="tabs-wrapper">
  <div class="tabs" id="tabsContainer"></div>
  <button class="add-list-btn" onclick="openModal()" title="Nueva lista">＋</button>
</div>

<!-- MODAL nueva lista -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">NUEVA LISTA</div>
    <input type="text" id="newListInput" placeholder="Nombre de la lista..." autocomplete="off" maxlength="24" />
    <div class="color-label">Elige un color</div>
    <div class="color-palette" id="colorPalette"></div>
    <div class="modal-btns">
      <button class="modal-confirm" id="modalConfirmBtn" onclick="confirmNewList()">CREAR</button>
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- INPUT -->
<div class="add-area">
  <div class="input-row">
    <input type="text" id="taskInput" placeholder="Añade una tarea..." autocomplete="off" />
    <button class="add-btn" id="addBtn" onclick="addTask()">+ AÑADIR</button>
  </div>
  <div class="priority-toggle">
    <button class="prio-btn active-urgent" id="btn-urgent" onclick="setPrio('urgent')">🔴 URGENTE</button>
    <button class="prio-btn" id="btn-normal" onclick="setPrio('normal')">🟢 NORMAL</button>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)">TODAS</button>
  <button class="filter-btn" onclick="setFilter('urgent', this)">URGENTES</button>
  <button class="filter-btn" onclick="setFilter('normal', this)">NORMALES</button>
  <button class="filter-btn" onclick="setFilter('done', this)">HECHAS</button>
</div>

<div id="taskContainer"></div>
<button class="clear-done" onclick="clearDone()">— LIMPIAR TAREAS COMPLETADAS —</button>

<footer>Designed by Antonio Jurado</footer>

<script>
  // ── COLORES DISPONIBLES ─────────────────────────────────
  const PALETTE = [
    '#c084fc', '#f472b6', '#fb7185', '#f97316',
    '#facc15', '#a3e635', '#34d399', '#22d3ee',
    '#60a5fa', '#818cf8', '#e2e8f0', '#94a3b8'
  ];

  const FIXED_LISTS = ['personal', 'trabajo'];

  let tasks         = JSON.parse(localStorage.getItem('bb-tasks-v2') || '[]');
  let lists         = JSON.parse(localStorage.getItem('bb-lists')    || JSON.stringify(FIXED_LISTS));
  let currentTab    = typeof lists[0] === 'string' ? lists[0] : lists[0].id;
  let currentFilter = 'all';
  let selectedPrio  = 'urgent';
  let selectedColor = PALETTE[0];

  FIXED_LISTS.forEach(f => { if (!lists.includes(f)) lists.unshift(f); });

  // ── GUARDAR ─────────────────────────────────────────────
  function save() {
    localStorage.setItem('bb-tasks-v2', JSON.stringify(tasks));
    localStorage.setItem('bb-lists',    JSON.stringify(lists));
  }

  // ── HELPERS ─────────────────────────────────────────────
  function getTabId(l)   { return typeof l === 'string' ? l : l.id; }
  function getTabName(l) { return typeof l === 'string' ? l.toUpperCase() : l.name.toUpperCase(); }
  function isFixed(l)    { return typeof l === 'string'; }
  function tabColor(id) {
    if (id === 'personal') return 'var(--personal)';
    if (id === 'trabajo')  return 'var(--trabajo)';
    const l = lists.find(l => getTabId(l) === id);
    return (l && l.color) ? l.color : '#c084fc';
  }

  // ── PALETA en modal ─────────────────────────────────────
  function renderPalette() {
    const container = document.getElementById('colorPalette');
    container.innerHTML = PALETTE.map(c => `
      <div class="color-swatch ${c === selectedColor ? 'selected' : ''}"
           style="background:${c}"
           onclick="selectColor('${c}')">
      </div>`).join('');
    syncModalColor();
  }

  function selectColor(c) {
    selectedColor = c;
    renderPalette();
  }

  function syncModalColor() {
    document.getElementById('modalTitle').style.color = selectedColor;
    document.getElementById('modalConfirmBtn').style.background = selectedColor;
    const input = document.getElementById('newListInput');
    input.style.borderColor = selectedColor;
  }

  // ── MODAL ───────────────────────────────────────────────
  function openModal() {
    selectedColor = PALETTE[0];
    document.getElementById('newListInput').value = '';
    renderPalette();
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('newListInput').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('newListInput').value = '';
    // Reset input border
    document.getElementById('newListInput').style.borderColor = '';
  }

  function confirmNewList() {
    const name = document.getElementById('newListInput').value.trim();
    if (!name) return;
    const id = 'custom_' + Date.now();
    lists.push({ id, name, color: selectedColor });
    save();
    closeModal();
    renderTabs();
    setTab(id);
  }

  document.getElementById('newListInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmNewList();
    if (e.key === 'Escape') closeModal();
  });

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  // ── ELIMINAR lista ──────────────────────────────────────
  function removeList(id, e) {
    e.stopPropagation();
    if (!confirm('¿Eliminar esta lista y todas sus tareas?')) return;
    tasks = tasks.filter(t => t.tab !== id);
    lists = lists.filter(l => getTabId(l) !== id);
    save();
    if (currentTab === id) currentTab = getTabId(lists[0]);
    renderTabs();
    setTab(currentTab);
  }

  // ── RENDERIZAR TABS ─────────────────────────────────────
  function renderTabs() {
    const container = document.getElementById('tabsContainer');
    container.innerHTML = lists.map(l => {
      const id    = getTabId(l);
      const name  = getTabName(l);
      const color = tabColor(id);
      const count = tasks.filter(t => t.tab === id && !t.done).length;
      const badge = count ? `<span class="tab-badge">(${count})</span>` : '';
      const isActive = id === currentTab;

      const activeStyle = isActive
        ? `color:${color}; border-color:${color}; background:${hexToRgba(color, 0.08)};`
        : '';

      const removeBtn = !isFixed(l)
        ? `<button class="tab-remove" onclick="removeList('${id}', event)" title="Eliminar lista">✕</button>`
        : '';

      return `<button class="tab-btn" style="${activeStyle}" onclick="setTab('${id}')">${name} ${badge}${removeBtn}</button>`;
    }).join('');

    const addBtn = document.getElementById('addBtn');
    const c = tabColor(currentTab);
    addBtn.style.background = c.startsWith('var') ? (currentTab === 'personal' ? '#ffaa33' : '#57c8ff') : c;
  }

  function hexToRgba(hex, alpha) {
    if (hex.startsWith('var')) return 'transparent';
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  // ── CAMBIAR TAB ─────────────────────────────────────────
  function setTab(id) {
    currentTab    = id;
    currentFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.filter-btn')[0].classList.add('active');
    const listObj = lists.find(l => getTabId(l) === id);
    const name = listObj ? getTabName(listObj) : id;
    document.getElementById('taskInput').placeholder = `Añade una tarea en ${name}...`;
    renderTabs();
    render();
  }

  // ── PRIORIDAD / FILTRO ──────────────────────────────────
  function setPrio(p) {
    selectedPrio = p;
    document.getElementById('btn-urgent').className = 'prio-btn' + (p === 'urgent' ? ' active-urgent' : '');
    document.getElementById('btn-normal').className  = 'prio-btn' + (p === 'normal'  ? ' active-normal' : '');
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  // ── TAREAS ───────────────────────────────────────────────
  function addTask() {
    const input = document.getElementById('taskInput');
    const text  = input.value.trim();
    if (!text) return;
    const now = new Date();
    const dd = String(now.getDate()).padStart(2,'0');
    const mm = String(now.getMonth()+1).padStart(2,'0');
    const yy = String(now.getFullYear()).slice(-2);
    const hh = String(now.getHours()).padStart(2,'0');
    const min = String(now.getMinutes()).padStart(2,'0');
    const timestamp = `${dd}-${mm}-${yy} ${hh}:${min}`;
    tasks.unshift({ id: Date.now(), text, prio: selectedPrio, tab: currentTab, done: false, timestamp });
    save(); input.value = ''; render(); renderTabs();
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); renderTabs(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render(); renderTabs();
  }

  function clearDone() {
    tasks = tasks.filter(t => !(t.done && t.tab === currentTab));
    save(); render(); renderTabs();
  }

  // ── RENDER ──────────────────────────────────────────────
  function render() {
    const container = document.getElementById('taskContainer');
    const tabTasks  = tasks.filter(t => t.tab === currentTab);

    let filtered = tabTasks;
    if (currentFilter === 'urgent') filtered = tabTasks.filter(t => t.prio === 'urgent' && !t.done);
    if (currentFilter === 'normal') filtered = tabTasks.filter(t => t.prio === 'normal' && !t.done);
    if (currentFilter === 'done')   filtered = tabTasks.filter(t => t.done);

    const urgent = tabTasks.filter(t => !t.done && t.prio === 'urgent').length;
    const normal = tabTasks.filter(t => !t.done && t.prio === 'normal').length;
    const done   = tabTasks.filter(t => t.done).length;
    document.getElementById('c-urgent').textContent = urgent;
    document.getElementById('c-normal').textContent = normal;
    document.getElementById('c-done').textContent   = done;

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty"><div class="empty-icon">◻</div>Sin tareas aquí. Añade algo o cambia el filtro.</div>`;
      return;
    }

    if (currentFilter === 'all') {
      const pending  = filtered.filter(t => !t.done);
      const doneList = filtered.filter(t => t.done);
      let html = '';
      if (pending.length)  html += `<div class="section-label">Pendientes — ${pending.length}</div><div class="task-list">${pending.map(taskHTML).join('')}</div>`;
      if (doneList.length) html += `<div class="section-label">Completadas — ${doneList.length}</div><div class="task-list">${doneList.map(taskHTML).join('')}</div>`;
      container.innerHTML = html;
    } else {
      container.innerHTML = `<div class="task-list">${filtered.map(taskHTML).join('')}</div>`;
    }
  }

  function taskHTML(t) {
    const cls = t.done ? 'done' : t.prio;
    const tag = t.done ? 'hecha' : t.prio === 'urgent' ? 'urgente' : 'normal';
    const ts  = t.timestamp ? `<span class="task-ts">${t.timestamp}</span>` : '';
    return `<div class="task-item ${cls}">
      <div class="task-check" onclick="toggleDone(${t.id})"></div>
      <span class="task-text">${escapeHTML(t.text)}</span>
      ${ts}
      <span class="task-prio-tag">${tag}</span>
      <button class="task-delete" onclick="deleteTask(${t.id})">✕</button>
    </div>`;
  }

  function escapeHTML(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // ── FECHA ────────────────────────────────────────────────
  (function() {
    const now  = new Date();
    const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    document.getElementById('dayName').textContent = dias[now.getDay()];
    document.getElementById('dayDate').textContent = now.getDate() + ' de ' + meses[now.getMonth()];
  })();

  // ── ARRANQUE ────────────────────────────────────────────
  renderTabs();
  render();
</script>
</body>
</html>
